version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      lint:
        patterns: ["eslint", "@eslint/*", "globals", "typescript-eslint"]
      test:
        patterns: ["jest", "@jest/*"]
      mcp:
        patterns: ["@modelcontextprotocol/*", "zod"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]
